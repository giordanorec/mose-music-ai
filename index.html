        // ============ UNDO ============
        function pushUndo(action) {
            undoStack.push(action);
            if (undoStack.length > MAX_UNDO) undoStack.shift();
        }

        function doUndo() {
            const action = undoStack.pop();
            if (!action) {
                showToast('Nada pra desfazer');
                return;
            }
            if (action.type === 'puck-add') {
                const peca = placed.find(p => p.placedId === action.placedId);
                if (peca) {
                    placed = placed.filter(p => p.placedId !== action.placedId);
                    wires = wires.filter(w => w.sourcePlacedId !== action.placedId && w.targetPlacedId !== action.placedId);
                    document.querySelector(`.placed-puck[data-placed-id="${action.placedId}"]`)?.remove();
                }
            } else if (action.type === 'puck-delete') {
                placed.push(action.peca);
                const el = makePuck(action.peca.puckId, action.peca, true);
                el.style.left = action.peca.x + 'px';
                el.style.top = action.peca.y + 'px';
                document.getElementById('canvas').appendChild(el);
                wires.push(...action.wires);
            } else if (action.type === 'wire-add') {
                wires = wires.filter(w => w.id !== action.wire.id);
            } else if (action.type === 'wire-delete') {
                wires.push(action.wire);
            }
            renderWires();
            updateStats();
            updateEmpty();
            saveWorkflow();
            showToast('↶ Desfeito');
        }

        // ============ ZOOM/PAN ============
        function applyTransform() {
            const canvas = document.getElementById('canvas');
            canvas.style.transform = `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`;
            // Atualiza display do nível de zoom no controle
            const zoomLabel = document.getElementById('zoom-level');
            if (zoomLabel) zoomLabel.textContent = Math.round(zoom * 100) + '%';
        }

        // Limites de zoom
        const ZOOM_MIN = 0.4;
        const ZOOM_MAX = 2.5;
        const ZOOM_STEP = 0.1;  // pra botões + e -

        // Aplica zoom mantendo o ponto sob o cursor estável (zoom "no cursor").
        // Sem cx/cy, zooma a partir do centro da tela.
        function applyZoom(newZoom, cx, cy) {
            newZoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, newZoom));
            const surface = document.getElementById('surface');
            const rect = surface.getBoundingClientRect();
            // Default: centro da surface
            if (cx === undefined) cx = rect.width / 2;
            if (cy === undefined) cy = rect.height / 2;
            // Coordenada do mundo no ponto (cx, cy) ANTES do zoom
            const worldX = (cx - pan.x) / zoom;
            const worldY = (cy - pan.y) / zoom;
            zoom = newZoom;
            // Recalcula pan pra manter (worldX, worldY) sob o cursor APÓS o zoom
            pan.x = cx - worldX * zoom;
            pan.y = cy - worldY * zoom;
            applyTransform();
            saveWorkflow();
        }

        // Roda do mouse → zoom (como Figma/Miro). Sem precisar Ctrl.
        // Mas se a pessoa usa um mouse comum só pra rolar, precisa de pan vertical:
        // shift + roda = pan horizontal, roda sozinha = zoom (decisão de UX).
        document.getElementById('surface').addEventListener('wheel', e => {
            e.preventDefault();
            const surface = document.getElementById('surface');
            const rect = surface.getBoundingClientRect();
            const cx = e.clientX - rect.left;
            const cy = e.clientY - rect.top;
            // deltaY positivo = roda pra baixo = zoom out (afasta)
            // deltaY negativo = roda pra cima = zoom in (aproxima)
            const factor = e.deltaY > 0 ? 0.9 : 1.1;
            applyZoom(zoom * factor, cx, cy);
        }, { passive: false });

        // Funções pros botões de controle de zoom
        window.zoomIn = function() {
            applyZoom(zoom + ZOOM_STEP);
        };
        window.zoomOut = function() {
            applyZoom(zoom - ZOOM_STEP);
        };
        window.zoomReset = function() {
            zoom = 1;
            pan = { x: 0, y: 0 };
            applyTransform();
            saveWorkflow();
        };
        window.zoomFit = function() {
            // Calcula bounding box de todas as peças e ajusta zoom+pan pra caber
            if (placed.length === 0) { zoomReset(); return; }
            const TILE = 70;
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            placed.forEach(p => {
                minX = Math.min(minX, p.x);
                minY = Math.min(minY, p.y);
                maxX = Math.max(maxX, p.x + TILE);
                maxY = Math.max(maxY, p.y + TILE);
            });
            const surface = document.getElementById('surface');
            const rect = surface.getBoundingClientRect();
            const padding = 80;
            const contentW = maxX - minX;
            const contentH = maxY - minY;
            const scaleX = (rect.width - padding*2) / contentW;
            const scaleY = (rect.height - padding*2) / contentH;
            zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, Math.min(scaleX, scaleY)));
            // Centraliza
            pan.x = rect.width/2 - (minX + contentW/2) * zoom;
            pan.y = rect.height/2 - (minY + contentH/2) * zoom;
            applyTransform();
            saveWorkflow();
        };

        // Pan da mesa: arrastar área vazia (não em peça)
        let panState = null;
        document.getElementById('surface').addEventListener('pointerdown', e => {
            if (e.target.id !== 'surface' && !e.target.classList.contains('surface-grid') && !e.target.classList.contains('surface-canvas')) return;
            // Click vazio = limpa seleção e popover
            clearSelection();
            // Inicia rubber band ou pan
            if (e.shiftKey) {
                startRubberBand(e);
            } else {
                panState = { startX: e.clientX, startY: e.clientY, panX: pan.x, panY: pan.y };
                window.addEventListener('pointermove', onPanMove);
                window.addEventListener('pointerup', onPanUp);
            }
        });

        function onPanMove(e) {
            if (!panState) return;
            pan.x = panState.panX + (e.clientX - panState.startX);
            pan.y = panState.panY + (e.clientY - panState.startY);
            applyTransform();
        }

        function onPanUp() {
            panState = null;
            window.removeEventListener('pointermove', onPanMove);
            window.removeEventListener('pointerup', onPanUp);
        }

        // ============ RUBBER BAND (multi-seleção) ============
        function startRubberBand(e) {
            const surface = document.getElementById('surface');
            const sRect = surface.getBoundingClientRect();
            const startX = e.clientX - sRect.left;
            const startY = e.clientY - sRect.top;
            const band = document.createElement('div');
            band.className = 'rubber-band';
            band.style.left = startX + 'px';
            band.style.top = startY + 'px';
            band.style.width = '0px'; band.style.height = '0px';
            surface.appendChild(band);
            rubberBand = { el: band, startX, startY, currentX: startX, currentY: startY };
            window.addEventListener('pointermove', onRubberMove);
            window.addEventListener('pointerup', onRubberUp);
        }

        function onRubberMove(e) {
            if (!rubberBand) return;
            const surface = document.getElementById('surface');
            const sRect = surface.getBoundingClientRect();
            rubberBand.currentX = e.clientX - sRect.left;
            rubberBand.currentY = e.clientY - sRect.top;
            const x = Math.min(rubberBand.startX, rubberBand.currentX);
            const y = Math.min(rubberBand.startY, rubberBand.currentY);
            const w = Math.abs(rubberBand.currentX - rubberBand.startX);
            const h = Math.abs(rubberBand.currentY - rubberBand.startY);
            rubberBand.el.style.left = x + 'px';
            rubberBand.el.style.top = y + 'px';
            rubberBand.el.style.width = w + 'px';
            rubberBand.el.style.height = h + 'px';
        }

        function onRubberUp(e) {
            if (!rubberBand) return;
            const surface = document.getElementById('surface');
            const sRect = surface.getBoundingClientRect();
            // Coordenadas no canvas (descontando pan/zoom)
            const x1 = (Math.min(rubberBand.startX, rubberBand.currentX) - pan.x) / zoom;
            const y1 = (Math.min(rubberBand.startY, rubberBand.currentY) - pan.y) / zoom;
            const x2 = (Math.max(rubberBand.startX, rubberBand.currentX) - pan.x) / zoom;
            const y2 = (Math.max(rubberBand.startY, rubberBand.currentY) - pan.y) / zoom;
            // Seleciona peças dentro
            placed.forEach(p => {
                if (p.x >= x1 && p.x <= x2 && p.y >= y1 && p.y <= y2) {
                    document.querySelector(`.placed-puck[data-placed-id="${p.placedId}"]`)?.classList.add('selected');
                }
            });
            rubberBand.el.remove();
            rubberBand = null;
            window.removeEventListener('pointermove', onRubberMove);
            window.removeEventListener('pointerup', onRubberUp);
        }

        // ============ STATS / EMPTY ============
        function updateStats() {
            document.getElementById('puck-count').textContent = placed.length;
            document.getElementById('wire-count').textContent = wires.length;
        }

        function updateEmpty() {
            const e = document.getElementById('empty-state');
            if (e) e.style.display = (placed.length > 0 || postIts.length > 0) ? 'none' : 'block';
        }

        // ============ PERSISTÊNCIA (localStorage) ============
        let saveTimeout = null;

        function saveWorkflow() {
            clearTimeout(saveTimeout);
            setStatus('●', 'salvando...');
            // Marca como sujo (mudou desde o último save nominal)
            markDirty();
            saveTimeout = setTimeout(() => {
                const data = {
                    placed: placed.map(p => ({
                        placedId: p.placedId, puckId: p.puckId,
                        x: p.x, y: p.y, textContent: p.textContent || null,
                        customName: p.customName || null
                    })),
                    wires, postIts, showLabels, zoom, pan,
                    workflowMeta,
                    currentWorkflowId, currentWorkflowName,
                    savedAt: new Date().toISOString()
                };
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                    setStatus('✓', isDirty ? 'auto-salvo (não salvo)' : 'salvo');
                } catch (err) {
                    console.error('Save failed', err);
                    setStatus('⚠', 'erro');
                }
            }, 500);
        }

        // Marca workflow como sujo (modificado desde o último save nominal).
        // Atualiza o indicador visual no header.
        function markDirty() {
            isDirty = true;
            updateWorkflowIndicator();
        }
        function clearDirty() {
            isDirty = false;
            updateWorkflowIndicator();
        }
        function updateWorkflowIndicator() {
            const el = document.getElementById('workflow-indicator');
            if (!el) return;
            const name = currentWorkflowName || 'Sem nome';
            const dot = isDirty ? '<span class="workflow-dirty-dot">●</span>' : '';
            el.innerHTML = `${dot}<span class="workflow-name">${name}</span>`;
        }

        function loadWorkflow() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return;
                const data = JSON.parse(raw);
                applyWorkflow(data);
                setStatus('✓', 'carregado');
            } catch (err) {
                console.warn('Load failed', err);
            }
        }

        function applyWorkflow(data) {
            placed = []; wires = []; postIts = [];
            document.querySelectorAll('.placed-puck, .post-it').forEach(el => el.remove());
            document.getElementById('wires-svg').innerHTML = '';

            if (typeof data.showLabels === 'boolean') {
                showLabels = data.showLabels;
                document.body.classList.toggle('show-labels', showLabels);
                updateToggleBtn();
            }
            if (typeof data.zoom === 'number') zoom = data.zoom;
            if (data.pan) pan = data.pan;
            applyTransform();
            // Restaura meta do workflow
            if (data.workflowMeta) {
                workflowMeta = { title: data.workflowMeta.title || '', description: data.workflowMeta.description || '' };
            } else {
                workflowMeta = { title: '', description: '' };
            }
            // Restaura identificação do workflow nomeado
            currentWorkflowId = data.currentWorkflowId || null;
            currentWorkflowName = data.currentWorkflowName || '';
            updateHeaderTitle();
            updateWorkflowIndicator();

            (data.placed || []).forEach(p => {
                const dbData = DB[p.puckId];
                if (!dbData) return;
                // V22: customName preservado ao carregar
                const full = { ...dbData, puckId: p.puckId, placedId: p.placedId, x: p.x, y: p.y, textContent: p.textContent, customName: p.customName || null };
                placed.push(full);
                const el = makePuck(p.puckId, full, true);
                el.style.left = p.x + 'px';
                el.style.top = p.y + 'px';
                document.getElementById('canvas').appendChild(el);
            });

            wires = data.wires || [];
            (data.postIts || []).forEach(n => {
                postIts.push(n);
                renderPostIt(n);
            });
            renderWires();
            updateStats();
            updateEmpty();
        }

        function setStatus(icon, text) {
            const el = document.getElementById('save-status');
            if (el) { el.textContent = icon; el.title = text; }
        }

        // ============ SISTEMA DE ARQUIVOS (workflows nomeados no localStorage) ============

        // Lê o "índice" de workflows salvos. Estrutura: { [id]: { id, name, savedAt, data } }
        function loadWorkflowsList() {
            try {
                const raw = localStorage.getItem(WORKFLOWS_LIST_KEY);
                return raw ? JSON.parse(raw) : {};
            } catch (e) {
                console.warn('Falha ao ler lista de workflows', e);
                return {};
            }
        }

        function saveWorkflowsList(list) {
            try {
                localStorage.setItem(WORKFLOWS_LIST_KEY, JSON.stringify(list));
            } catch (e) {
                console.error('Falha ao gravar lista de workflows', e);
            }
        }

        // Serializa o estado atual em um objeto plano (formato persistido)
        function serializeCurrentWorkflow() {
            return {
                placed: placed.map(p => ({
                    placedId: p.placedId, puckId: p.puckId,
                    x: p.x, y: p.y,
                    textContent: p.textContent || null,
                    customName: p.customName || null
                })),
                wires, postIts, showLabels, zoom, pan,
                workflowMeta,
                version: 4
            };
        }

        // ============ NOVO ============
        window.newWorkflow = function() {
            if (isDirty && (placed.length > 0 || postIts.length > 0)) {
                confirmUnsavedChanges(
                    'Iniciar novo workflow?',
                    'Você tem mudanças não salvas. Deseja salvar antes?',
                    () => { saveCurrent(() => doNewWorkflow()); },  // salvar e fazer
                    () => doNewWorkflow(),                          // descartar e fazer
                );
            } else {
                doNewWorkflow();
            }
        };

        function doNewWorkflow() {
            placed = []; wires = []; postIts = [];
            document.querySelectorAll('.placed-puck, .post-it').forEach(el => el.remove());
            document.getElementById('wires-svg').innerHTML = '';
            workflowMeta = { title: '', description: '' };
            currentWorkflowId = null;
            currentWorkflowName = '';
            zoom = 1; pan = { x: 0, y: 0 };
            applyTransform();
            updateHeaderTitle();
            updateWorkflowIndicator();
            updateStats();
            updateEmpty();
            renderWires();
            clearDirty();
            saveWorkflow();  // grava o autosave do estado vazio
            showToast('Novo workflow');
        }

        // ============ SALVAR ============
        // Se já tem id (foi aberto/salvo antes), atualiza. Senão, abre Salvar Como.
        window.saveCurrent = function(onDone) {
            if (currentWorkflowId) {
                writeWorkflowToList(currentWorkflowId, currentWorkflowName);
                showToast(`Salvo: ${currentWorkflowName}`);
                clearDirty();
                if (onDone) onDone();
            } else {
                saveCurrentAs(onDone);
            }
        };

        // ============ SALVAR COMO ============
        window.saveCurrentAs = function(onDone) {
            const defaultName = currentWorkflowName || workflowMeta.title || 'Meu workflow';
            openRenameModal({
                title: 'Salvar workflow como',
                placeholder: 'Nome do workflow',
                currentValue: defaultName,
                hint: 'Esse nome ficará na lista de workflows salvos.',
                onSave: (newName) => {
                    if (!newName.trim()) return;
                    const id = currentWorkflowId || `wf_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`;
                    currentWorkflowId = id;
                    currentWorkflowName = newName.trim();
                    writeWorkflowToList(id, currentWorkflowName);
                    updateWorkflowIndicator();
                    showToast(`Salvo: ${currentWorkflowName}`);
                    clearDirty();
                    if (onDone) onDone();
                }
            });
        };

        function writeWorkflowToList(id, name) {
            const list = loadWorkflowsList();
            list[id] = {
                id, name,
                savedAt: new Date().toISOString(),
                data: serializeCurrentWorkflow()
            };
            saveWorkflowsList(list);
            // Também grava o autosave com o nome novo
            saveWorkflow();
        }

        // ============ ABRIR ============
        window.openWorkflowsModal = function() {
            const list = loadWorkflowsList();
            const items = Object.values(list).sort((a, b) =>
                (b.savedAt || '').localeCompare(a.savedAt || ''));

            const root = document.getElementById('modal-root');
            const itemsHTML = items.length === 0
                ? '<p style="color: var(--card-ink-soft); text-align: center; padding: 2rem;">Nenhum workflow salvo ainda. Use <b>Salvar como…</b> pra criar o primeiro.</p>'
                : items.map(w => {
                    const placedCount = (w.data.placed || []).length;
                    const wireCount  = (w.data.wires || []).length;
                    const isCurrent = w.id === currentWorkflowId;
                    const date = new Date(w.savedAt).toLocaleString('pt-BR', {
                        day: '2-digit', month: '2-digit', year: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });
                    return `
                        <div class="workflow-card ${isCurrent ? 'active' : ''}">
                            <div class="workflow-card-info">
                                <div class="workflow-card-name">${w.name}${isCurrent ? ' <span class="workflow-card-badge">atual</span>' : ''}</div>
                                <div class="workflow-card-meta">${placedCount} módulos · ${wireCount} cabos · ${date}</div>
                            </div>
                            <div class="workflow-card-actions">
                                <button class="header-btn" onclick="openWorkflowById('${w.id}')">Abrir</button>
                                <button class="header-btn danger" onclick="deleteWorkflowById('${w.id}', '${w.name.replace(/'/g, "\\'")}')">×</button>
                            </div>
                        </div>
                    `;
                }).join('');

            root.innerHTML = `
                <div class="modal-backdrop show" onclick="if(event.target===this) closeModal()">
                    <div class="modal" style="max-width: 560px;">
                        <button class="modal-close" onclick="closeModal()">×</button>
                        <div class="modal-title">Abrir workflow</div>
                        <p style="color: var(--card-ink-soft); font-size: 0.85rem; margin: 8px 0 16px;">
                            Workflows salvos no seu navegador. Você também pode importar um arquivo JSON.
                        </p>
                        <div style="max-height: 50vh; overflow-y: auto; margin: 12px -8px; padding: 0 8px;">
                            ${itemsHTML}
                        </div>
                        <div class="modal-actions" style="margin-top: 20px; justify-content: space-between;">
                            <button class="header-btn" onclick="document.getElementById('import-file').click(); closeModal();">Importar do disco…</button>
                            <button class="header-btn" onclick="closeModal()">Fechar</button>
                        </div>
                    </div>
                </div>
            `;
        };

        window.openWorkflowById = function(id) {
            const list = loadWorkflowsList();
            const w = list[id];
            if (!w) return;
            const doOpen = () => {
                applyWorkflow({ ...w.data, currentWorkflowId: id, currentWorkflowName: w.name });
                clearDirty();
                saveWorkflow();
                closeModal();
                showToast(`Aberto: ${w.name}`);
            };
            if (isDirty && (placed.length > 0 || postIts.length > 0)) {
                confirmUnsavedChanges(
                    `Abrir "${w.name}"?`,
                    'Você tem mudanças não salvas no workflow atual. Deseja salvar antes?',
                    () => saveCurrent(doOpen),
                    doOpen
                );
            } else {
                doOpen();
            }
        };

        window.deleteWorkflowById = function(id, name) {
            // Confirmação inline (sem modal duplo, que ficaria empilhado)
            if (!confirm(`Excluir o workflow "${name}"? Essa ação não pode ser desfeita.`)) return;
            const list = loadWorkflowsList();
            delete list[id];
            saveWorkflowsList(list);
            // Se estava aberto agora, perde a identidade (mas mantém o conteúdo na tela)
            if (currentWorkflowId === id) {
                currentWorkflowId = null;
                currentWorkflowName = '';
                markDirty();
                updateWorkflowIndicator();
            }
            // Re-renderiza o modal pra atualizar a lista
            openWorkflowsModal();
            showToast(`Excluído: ${name}`);
        };

        // ============ CONFIRMAÇÃO DE MUDANÇAS NÃO SALVAS ============
        function confirmUnsavedChanges(title, message, onSave, onDiscard) {
            const root = document.getElementById('modal-root');
            root.innerHTML = `
                <div class="modal-backdrop show" onclick="if(event.target===this) closeModal()">
                    <div class="modal" style="max-width: 460px;">
                        <button class="modal-close" onclick="closeModal()">×</button>
                        <div class="modal-title">${title}</div>
                        <p style="color: var(--card-ink); margin: 14px 0;">${message}</p>
                        <div class="modal-actions" style="margin-top: 20px;">
                            <button class="header-btn" onclick="closeModal()">Cancelar</button>
                            <button class="header-btn" id="discard-btn">Descartar</button>
                            <button class="header-btn active" id="save-btn">Salvar</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('save-btn').addEventListener('click', () => {
                closeModal();
                if (onSave) onSave();
            });
            document.getElementById('discard-btn').addEventListener('click', () => {
                closeModal();
                if (onDiscard) onDiscard();
            });
        }

        // ============ EXPORT/IMPORT ============
        window.exportJSON = function() {
            try {
                const data = {
                    version: 4,
                    workflowMeta,
                    placed: placed.map(p => ({ placedId: p.placedId, puckId: p.puckId, x: p.x, y: p.y, textContent: p.textContent || null, customName: p.customName || null })),
                    wires, postIts, showLabels,
                    exportedAt: new Date().toISOString()
                };
                const json = JSON.stringify(data, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `music-ai-workflow-${Date.now()}.json`;
                a.style.display = 'none';
                // Anchor PRECISA estar no DOM em alguns browsers (Firefox)
                document.body.appendChild(a);
                a.click();
                // Aguarda 1s antes de revogar URL — garante que o download começou
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 1000);
                showToast('Exportado!');
            } catch (err) {
                console.error('Erro ao exportar:', err);
                showToast('Erro ao exportar — veja console');
            }
        };

        window.importJSON = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const data = JSON.parse(e.target.result);
                    applyWorkflow(data);
                    saveWorkflow();
                    showToast('Importado!');
                } catch (err) {
                    showToast('Arquivo inválido');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        };

        window.clearAll = function() {
            if (!confirm('Apagar tudo?')) return;
            placed = []; wires = []; postIts = []; undoStack = [];
            workflowMeta = { title: '', description: '' };
            updateHeaderTitle();
            document.querySelectorAll('.placed-puck, .post-it').forEach(el => el.remove());
            document.getElementById('wires-svg').innerHTML = '';
            updateStats(); updateEmpty(); saveWorkflow();
        };

        // ============ TOAST ============
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }


        // ============ THEME PICKER ============
        // Renderiza um ícone de preview no card de tema
        function themePreviewIcon(themeKey, iconKey) {
            const wrap = (svg) => `<span class="inline-svg-wrap" style="width:28px;height:28px;display:inline-block;color:var(--card-ink);">${svg}</span>`;
            if (themeKey === 'custom-svg' && CUSTOM_SVGS[iconKey]) {
                return wrap(CUSTOM_SVGS[iconKey]);
            }
            if (ICON_DATA[themeKey] && ICON_DATA[themeKey][iconKey]) {
                return wrap(ICON_DATA[themeKey][iconKey]);
            }
            if (themeKey === 'emoji') {
                // Tema emoji usa Iconify em runtime via <iconify-icon> (não tem SVG pré-baixado)
                const iconifyName = ICON_THEMES['emoji'].icons[iconKey];
                if (iconifyName) {
                    return `<iconify-icon icon="${iconifyName}" style="font-size: 26px; width: 28px; height: 28px;"></iconify-icon>`;
                }
            }
            return '';
        }

        window.openThemePicker = function() {
            const root = document.getElementById('modal-root');
            const cards = Object.entries(ICON_THEMES).map(([key, t]) => `
                <div class="template-card ${key === currentTheme ? 'active-theme' : ''}" onclick="setTheme('${key}')" style="position: relative;">
                    <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 8px;">
                        ${themePreviewIcon(key, 'microphone')}
                        ${themePreviewIcon(key, 'wand')}
                        ${themePreviewIcon(key, 'drum')}
                        ${themePreviewIcon(key, 'headphones')}
                        ${themePreviewIcon(key, 'target')}
                    </div>
                    <div class="template-card-title">${t.name}${key === currentTheme ? ' ✓' : ''}</div>
                    <div class="template-card-desc">${t.desc}</div>
                </div>
            `).join('');
            root.innerHTML = `
                <div class="modal-backdrop show" onclick="if(event.target===this) closeModal()">
                    <div class="modal" style="max-width: 600px;">
                        <button class="modal-close" onclick="closeModal()">×</button>
                        <div class="modal-title">🎨 Tema de Ícones</div>
                        <div style="font-size: 0.72rem; color: var(--card-ink-soft); margin-bottom: 0.8rem;">Escolha o estilo que combina mais com o produto</div>
                        <div style="display: flex; flex-direction: column; gap: 10px;">${cards}</div>
                    </div>
                </div>
            `;
        };

        window.setTheme = function(themeKey) {
            if (!ICON_THEMES[themeKey]) return;
            currentTheme = themeKey;
            localStorage.setItem('mose-music-ai-theme', themeKey);
            closeModal();
            // Re-renderiza inventário
            renderInventory();
            // Re-renderiza peças no canvas
            const placedSnapshot = [...placed];
            const wiresSnapshot = [...wires];
            placed = [];
            document.querySelectorAll('.placed-puck').forEach(el => el.remove());
            placedSnapshot.forEach(p => {
                const dbData = DB[p.puckId];
                if (!dbData) return;
                const full = { ...dbData, puckId: p.puckId, placedId: p.placedId, x: p.x, y: p.y, textContent: p.textContent, customName: p.customName || null };
                placed.push(full);
                const el = makePuck(p.puckId, full, true);
                el.style.left = p.x + 'px';
                el.style.top = p.y + 'px';
                document.getElementById('canvas').appendChild(el);
            });
            wires = wiresSnapshot;
            renderWires();
            // Re-preload do novo tema
            preloadIcons();
            showToast(`Tema: ${ICON_THEMES[themeKey].name}`);
        };

        // ============ PRELOAD ICONIFY ============
        function preloadIcons() {
            // Todos os temas agora usam SVG inline (custom-svg, lucide, tabler, ph-duotone, solar-bd)
            // ou emoji nativo. Nenhum precisa de preload via API.
            if (['custom-svg', 'lucide', 'tabler', 'ph-duotone', 'solar-bd', 'emoji'].includes(currentTheme)) return;
            // Pega ícones do tema atual + emoji (fallback)
            const currentIcons = Object.values(DB).map(d => getIcon(d.iconKey));
            const fallbackIcons = Object.values(DB).map(d => ICON_THEMES['emoji'].icons[d.iconKey]);
            const allIcons = [...new Set([...currentIcons, ...fallbackIcons, 'fluent-emoji-flat:musical-notes'])];

            const indicator = document.createElement('div');
            indicator.className = 'icons-loading';
            indicator.textContent = `🎨 Carregando ${allIcons.length} ícones...`;
            document.body.appendChild(indicator);

            // Iconify expõe Iconify.loadIcons em window quando carrega via script tag
            // Em algumas versões pode estar como window.Iconify ou similar
            const tryLoad = () => {
                if (window.Iconify && window.Iconify.loadIcons) {
                    window.Iconify.loadIcons(allIcons, () => {
                        indicator.textContent = `✓ Ícones prontos`;
                        setTimeout(() => indicator.remove(), 1200);
                    });
                    return true;
                }
                // iconify-icon 2.x — não tem API global de loadIcons.
                // Mas podemos forçar o preload criando elementos invisíveis pra todos os ícones.
                // O navegador vai disparar requests em paralelo.
                const preloadDiv = document.createElement('div');
                preloadDiv.style.cssText = 'position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;';
                allIcons.forEach(icon => {
                    const ic = document.createElement('iconify-icon');
                    ic.setAttribute('icon', icon);
                    preloadDiv.appendChild(ic);
                });
                document.body.appendChild(preloadDiv);
                // Indicador some depois de 3s (tempo aprox pra carregar)
                setTimeout(() => {
                    indicator.textContent = `✓ Ícones prontos`;
                    setTimeout(() => indicator.remove(), 800);
                }, 3000);
                return true;
            };

            if (window.Iconify) tryLoad();
            else setTimeout(tryLoad, 200);
        }


        // ============ WORKFLOW META (título + descrição) ============
        window.openWorkflowMetaModal = function() {
            const root = document.getElementById('modal-root');
            root.innerHTML = `
                <div class="modal-backdrop show" onclick="if(event.target===this) closeModal()">
                    <div class="modal" style="max-width: 500px;">
                        <button class="modal-close" onclick="closeModal()">×</button>
                        <div class="modal-title">📓 Sobre este workflow</div>
                        <div style="font-size: 0.72rem; color: var(--card-ink-soft); margin-bottom: 0.8rem;">Dê um título e descreva o objetivo desta composição. Útil pra documentar o workflow ou compartilhar com a equipe.</div>
                        <div style="display:flex; flex-direction:column; gap: 0.7rem;">
                            <div>
                                <div style="font-size: 0.7rem; font-weight: 600; color: var(--card-ink-soft); margin-bottom: 4px;">Título</div>
                                <input type="text" id="meta-title" placeholder="Ex: Karaokê com Voice Studio" value="${(workflowMeta.title || '').replace(/"/g, '&quot;')}" style="width:100%; padding: 0.55rem; border: 2px solid var(--card-bg-soft); border-radius: 8px; font-family: inherit; font-size: 0.85rem; background: #FFF; color: var(--card-ink);">
                            </div>
                            <div>
                                <div style="font-size: 0.7rem; font-weight: 600; color: var(--card-ink-soft); margin-bottom: 4px;">Descrição</div>
                                <textarea id="meta-desc" placeholder="Para que serve, qual o output esperado, quem vai usar, etc.">${workflowMeta.description || ''}</textarea>
                            </div>
                        </div>
                        <div class="modal-actions">
                            <button class="header-btn" onclick="closeModal()">Cancelar</button>
                            <button class="header-btn active" onclick="saveWorkflowMeta()">Salvar</button>
                        </div>
                    </div>
                </div>
            `;
            setTimeout(() => document.getElementById('meta-title').focus(), 100);
        };

        window.saveWorkflowMeta = function() {
            const titleEl = document.getElementById('meta-title');
            const descEl = document.getElementById('meta-desc');
            workflowMeta.title = titleEl.value.trim();
            workflowMeta.description = descEl.value.trim();
            updateHeaderTitle();
            closeModal();
            saveWorkflow();
            showToast(workflowMeta.title ? 'Salvo' : 'Workflow sem título');
        };

        function updateHeaderTitle() {
            const headerTitle = document.getElementById('header-title');
            if (!headerTitle) return;
            if (workflowMeta.title) {
                headerTitle.textContent = `📓 ${workflowMeta.title}`;
                headerTitle.title = workflowMeta.description || '';
            } else {
                headerTitle.textContent = '🎵 Music.AI';
                headerTitle.title = '';
            }
        }


        // ============ MODAL GENÉRICO DE RENOMEAR ============
        // Reutilizado pra módulos placed e cabos. Recebe nome atual + callback de salvamento.
        function openRenameModal(opts) {
            const { title, currentValue, placeholder, hint, onSave } = opts;
            const root = document.getElementById('modal-root');
            const safeValue = (currentValue || '').replace(/"/g, '&quot;').replace(/</g, '&lt;');
            root.innerHTML = `
                <div class="modal-backdrop show" onclick="if(event.target===this) closeModal()">
                    <div class="modal" style="max-width: 420px;">
                        <button class="modal-close" onclick="closeModal()">×</button>
                        <div class="modal-title">${title}</div>
                        ${hint ? `<div style="font-size: 0.72rem; color: var(--card-ink-soft); margin-bottom: 0.7rem;">${hint}</div>` : ''}
                        <input type="text" id="rename-input" value="${safeValue}" placeholder="${placeholder || ''}"
                               style="width:100%; padding: 0.6rem; border: 2px solid var(--card-bg-soft); border-radius: 8px; font-family: inherit; font-size: 0.9rem; background: #FFF; color: var(--card-ink);">
                        <div style="font-size: 0.65rem; color: var(--card-ink-soft); margin-top: 0.5rem;">Deixe vazio pra usar o nome padrão.</div>
                        <div class="modal-actions">
                            <button class="header-btn" onclick="closeModal()">Cancelar</button>
                            <button class="header-btn active" id="rename-confirm">Salvar</button>
                        </div>
                    </div>
                </div>
            `;
            const input = document.getElementById('rename-input');
            setTimeout(() => { input.focus(); input.select(); }, 50);
            const confirm = () => {
                const value = input.value.trim();
                onSave(value);
                closeModal();
            };
            document.getElementById('rename-confirm').onclick = confirm;
            input.addEventListener('keydown', e => {
                if (e.key === 'Enter') { e.preventDefault(); confirm(); }
                if (e.key === 'Escape') { e.preventDefault(); closeModal(); }
            });
        }

        // Renomear módulo placed
        window.openRenamePlacedModal = function(placedId) {
            const peca = placed.find(p => p.placedId === placedId);
            if (!peca) return;
            openRenameModal({
                title: 'Renomear módulo',
                currentValue: peca.customName || '',
                placeholder: peca.name,
                hint: `Tipo: ${peca.name}. Use um nome próprio pra distinguir múltiplas peças do mesmo tipo (ex: "Voz Principal", "Coro").`,
                onSave: (value) => {
                    peca.customName = value || null;
                    refreshPlacedLabel(placedId);
                    saveWorkflow();
                    showToast(value ? `Renomeado: ${value}` : 'Nome restaurado');
                }
            });
        };

        // Renomear cabo (wire)
        window.openRenameWireModal = function(wireId) {
            const w = wires.find(x => x.id === wireId);
            if (!w) return;
            openRenameModal({
                title: '🔗 Nomear conexão',
                currentValue: w.customLabel || '',
                placeholder: TYPE_LABELS[w.type].toLowerCase(),
                hint: `Tipo de dado: ${TYPE_LABELS[w.type]}. Dê um nome pra esse fluxo (ex: "Voz lead → mix master", "MIDI piano").`,
                onSave: (value) => {
                    w.customLabel = value || null;
                    renderWires();
                    saveWorkflow();
                    showToast(value ? `Conexão: ${value}` : 'Nome restaurado');
                }
            });
        };

        // Atualiza só o label de uma peça placed (sem re-renderizar tudo)
        function refreshPlacedLabel(placedId) {
            const el = document.querySelector(`.placed-puck[data-placed-id="${placedId}"]`);
            if (!el) return;
            const peca = placed.find(p => p.placedId === placedId);
            if (!peca) return;
            const label = el.querySelector('.placed-label');
            if (label) label.textContent = peca.customName || peca.name;
        }

        // ============ MENU DE CONTEXTO (botão direito) ============
        // Single menu element reutilizado. Fecha automaticamente em qualquer click fora.
        // anchorEl: elemento clicado (módulo ou wire). Se passado, o menu é posicionado
        // ao LADO dele, sem sobrepor. Senão, posiciona no cursor.
        function showContextMenu(items, x, y, anchorEl) {
            closeContextMenu();
            const menu = document.createElement('div');
            menu.className = 'ctx-menu';
            menu.id = 'ctx-menu-active';
            // Posicionar primeiro fora da tela pra medir
            menu.style.left = '-9999px';
            menu.style.top = '0px';
            items.forEach(item => {
                if (item.divider) {
                    const div = document.createElement('div');
                    div.className = 'ctx-menu-divider';
                    menu.appendChild(div);
                } else if (item.label) {
                    const lbl = document.createElement('div');
                    lbl.className = 'ctx-menu-label';
                    lbl.textContent = item.label;
                    menu.appendChild(lbl);
                } else {
                    const el = document.createElement('div');
                    el.className = 'ctx-menu-item' + (item.danger ? ' danger' : '');
                    el.innerHTML = `<span class="ctx-menu-icon">${item.icon || ''}</span>${item.text}`;
                    el.addEventListener('click', (ev) => {
                        ev.stopPropagation();
                        closeContextMenu();
                        item.action();
                    });
                    menu.appendChild(el);
                }
            });
            document.body.appendChild(menu);

            const menuRect = menu.getBoundingClientRect();
            const menuW = menuRect.width;
            const menuH = menuRect.height;
            const pad = 8;
            const vw = window.innerWidth;
            const vh = window.innerHeight;

            let finalX, finalY;

            if (anchorEl) {
                // Tenta posicionar à DIREITA do elemento. Se não couber, à esquerda.
                // Verticalmente alinha o topo do menu com o topo do elemento.
                const aRect = anchorEl.getBoundingClientRect();
                const spaceRight = vw - aRect.right - pad;
                const spaceLeft  = aRect.left - pad;
                if (spaceRight >= menuW) {
                    finalX = aRect.right + pad;
                } else if (spaceLeft >= menuW) {
                    finalX = aRect.left - menuW - pad;
                } else {
                    // Nem direita nem esquerda cabem — usa cursor mas evita sobreposição
                    finalX = Math.min(x + 4, vw - menuW - pad);
                }
                finalY = aRect.top;
                // Se não cabe verticalmente partindo do topo, alinha pelo bottom
                if (finalY + menuH > vh - pad) {
                    finalY = Math.max(pad, vh - menuH - pad);
                }
            } else {
                // Sem anchor (canvas vazio etc.) — posiciona no cursor com pequeno offset
                finalX = Math.min(x + 4, vw - menuW - pad);
                finalY = Math.min(y + 4, vh - menuH - pad);
            }

            // Garante que não sai da tela (clamp final)
            finalX = Math.max(pad, finalX);
            finalY = Math.max(pad, finalY);

            menu.style.left = finalX + 'px';
            menu.style.top = finalY + 'px';
        }
        function closeContextMenu() {
            const m = document.getElementById('ctx-menu-active');
            if (m) m.remove();
        }
        // Fecha em qualquer click fora ou Escape
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('ctx-menu-active');
            if (menu && !menu.contains(e.target)) closeContextMenu();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeContextMenu();
        });

        // Menu pra módulo placed
        function openModuleContextMenu(placedId, x, y) {
            const peca = placed.find(p => p.placedId === placedId);
            if (!peca) return;
            const anchorEl = document.querySelector(`.placed-puck[data-placed-id="${placedId}"]`);
            const displayName = peca.customName || peca.name;
            showContextMenu([
                { label: `Módulo: ${displayName}` },
                {
                    icon: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
                    text: 'Renomear', action: () => openRenamePlacedModal(placedId)
                },
                {
                    icon: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>',
                    text: 'Duplicar', action: () => duplicateModule(placedId)
                },
                { divider: true },
                {
                    icon: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>',
                    text: 'Deletar módulo', danger: true, action: () => deletePuck(placedId)
                }
            ], x, y, anchorEl);
        }

        // Menu pra wire
        function openWireContextMenu(wireId, x, y) {
            const w = wires.find(ww => ww.id === wireId);
            if (!w) return;
            // Pra wire não tem "anchor element" útil (path SVG é fininho), mantém posicionamento por cursor
            const labelTxt = w.customLabel || TYPE_LABELS[w.type];
            showContextMenu([
                { label: `Cabo: ${labelTxt}` },
                {
                    icon: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
                    text: 'Renomear', action: () => openRenameWireModal(wireId)
                },
                { divider: true },
                {
                    icon: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>',
                    text: 'Deletar cabo', danger: true, action: () => deleteWire(wireId)
                }
            ], x, y);
        }

        // Função pra duplicar um módulo (offset de +20px). customName não é copiado.
        function duplicateModule(placedId) {
            const peca = placed.find(p => p.placedId === placedId);
            if (!peca) return;
            const newPlacedId = `p_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
            const newPeca = { ...peca, placedId: newPlacedId, x: peca.x + 20, y: peca.y + 20 };
            delete newPeca.customName;
            placed.push(newPeca);
            const el = makePuck(peca.puckId, newPeca, true);
            el.style.left = newPeca.x + 'px';
            el.style.top = newPeca.y + 'px';
            document.getElementById('canvas').appendChild(el);
            updateStats();
            renderWires();
            saveWorkflow();
            pushUndo({ type: 'puck-add', placedId: newPlacedId });
        }

        // Listeners de contextmenu — registrados após init
        function bindContextMenuListeners() {
            // Em módulos placed
            document.querySelectorAll('.placed-puck').forEach(el => {
                if (el.dataset.ctxBound) return;
                el.dataset.ctxBound = '1';
                el.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    openModuleContextMenu(el.dataset.placedId, e.clientX, e.clientY);
                });
            });
            // Em wires (paths SVG e labels)
            document.querySelectorAll('.wire-path:not(.wire-drawing)').forEach(el => {
                if (el.dataset.ctxBound) return;
                el.dataset.ctxBound = '1';
                el.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    if (el.dataset.wireId) openWireContextMenu(el.dataset.wireId, e.clientX, e.clientY);
                });
            });
        }

        // ============ INIT ============
        preloadIcons();
        renderInventory();
        updateStats();
        loadWorkflow();
        // Após carregar do autosave, considera estado limpo (não-dirty)
        // O dirty só vai ativar quando o usuário fizer uma ação nova
        clearDirty();

        // Bindings de contextmenu — observer pra pegar elementos novos automaticamente
        bindContextMenuListeners();
        const ctxObserver = new MutationObserver(() => bindContextMenuListeners());
        ctxObserver.observe(document.getElementById('surface'), { childList: true, subtree: true });
        ctxObserver.observe(document.getElementById('wires-svg'), { childList: true, subtree: true });

        // Atalhos de teclado pra zoom (Ctrl + +/-/0)
        document.addEventListener('keydown', (e) => {
            // Não interfere quando está editando texto
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if (!(e.ctrlKey || e.metaKey)) return;
            if (e.key === '=' || e.key === '+') {
                e.preventDefault();
                zoomIn();
            } else if (e.key === '-' || e.key === '_') {
                e.preventDefault();
                zoomOut();
            } else if (e.key === '0') {
                e.preventDefault();
                zoomReset();
            }
        });

        // Atalhos de teclado pro sistema de arquivos
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if (!(e.ctrlKey || e.metaKey)) return;
            if (e.key === 's' || e.key === 'S') {
                e.preventDefault();
                if (e.shiftKey) saveCurrentAs(); else saveCurrent();
            } else if (e.key === 'o' || e.key === 'O') {
                e.preventDefault();
                openWorkflowsModal();
            } else if (e.key === 'n' || e.key === 'N') {
                e.preventDefault();
                newWorkflow();
            }
        });

        // Avisa antes de fechar a aba se há mudanças não salvas
        window.addEventListener('beforeunload', (e) => {
            if (isDirty && currentWorkflowId) {
                // Browsers modernos ignoram a mensagem custom, mostram só "deixar a página?"
                e.preventDefault();
                e.returnValue = '';
                return '';
            }
        });

        // Atualiza o display do nível de zoom + indicador do workflow inicialmente
        applyTransform();
        updateWorkflowIndicator();
        // O loadWorkflow já rodou e setou currentWorkflowId/Name a partir do autosave.
        // Como a sessão foi RESTAURADA do autosave, consideramos que ela mantém o estado
        // de "dirty" do último uso — pra ser conservador, deixo como dirty quando há nome
        // definido (significa que foi salvo antes mas pode ter modificações posteriores).
        // Quando NÃO há nome ainda, o estado é "rascunho" e fica dirty automaticamente.
    </script>
</body>
</html>
