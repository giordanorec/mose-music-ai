        // ============ EVENTOS NA PEÇA ============
        function attachPuckEvents(el, isPlaced) {
            // Double-click no label de uma peça placed abre modal de renomear
            if (isPlaced) {
                const label = el.querySelector('.placed-label');
                if (label) {
                    label.addEventListener('dblclick', e => {
                        e.stopPropagation();
                        e.preventDefault();
                        openRenamePlacedModal(el.dataset.placedId);
                    });
                    // Impede que pointerdown no label inicie drag
                    label.addEventListener('pointerdown', e => e.stopPropagation());
                }
            }
            el.addEventListener('pointerdown', e => {
                if (e.target.classList.contains('connector')) return;
                if (e.target.dataset.action === 'delete') {
                    e.stopPropagation();
                    deletePuck(el.dataset.placedId);
                    return;
                }
                onPuckPointerDown(e, el, isPlaced);
            });
            // Dbl click pra editar texto (text-in / lyrics-in)
            if (isPlaced) {
                el.addEventListener('dblclick', e => {
                    const placedId = el.dataset.placedId;
                    const peca = placed.find(p => p.placedId === placedId);
                    if (peca && DB[peca.puckId].editable === 'text') {
                        openTextEditor(placedId);
                    }
                });
            }
        }

        let dragGhost = null;

        function onPuckPointerDown(e, el, isPlaced) {
            e.preventDefault();
            const rect = el.getBoundingClientRect();

            // Multi-select drag: se a peça está selecionada e há outras selecionadas, move todas
            let multiSelected = [];
            if (isPlaced && el.classList.contains('selected')) {
                const allSelected = document.querySelectorAll('.placed-puck.selected');
                if (allSelected.length > 1) {
                    multiSelected = Array.from(allSelected)
                        .filter(s => s !== el)
                        .map(s => {
                            const p = placed.find(pp => pp.placedId === s.dataset.placedId);
                            return p ? { el: s, placedId: p.placedId, startX: p.x, startY: p.y } : null;
                        })
                        .filter(Boolean);
                }
            }

            dragState = {
                el, isPlaced, puckId: el.dataset.puckId,
                startX: e.clientX, startY: e.clientY,
                offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top,
                moved: false,
                shiftKey: e.shiftKey,
                // Posição inicial da peça arrastada (canvas coords)
                initialPlacedX: isPlaced ? (placed.find(p => p.placedId === el.dataset.placedId)?.x ?? 0) : 0,
                initialPlacedY: isPlaced ? (placed.find(p => p.placedId === el.dataset.placedId)?.y ?? 0) : 0,
                multiSelected
            };
            window.addEventListener('pointermove', onPuckPointerMove);
            window.addEventListener('pointerup', onPuckPointerUp);
        }

        function onPuckPointerMove(e) {
            if (!dragState) return;
            const dx = Math.abs(e.clientX - dragState.startX);
            const dy = Math.abs(e.clientY - dragState.startY);
            if (!dragState.moved && (dx > 6 || dy > 6)) {
                dragState.moved = true;
                if (dragState.isPlaced) {
                    dragState.el.classList.add('dragging');
                    createDragGhost(dragState.puckId, e.clientX, e.clientY);
                } else {
                    createDragGhost(dragState.puckId, e.clientX, e.clientY);
                    document.getElementById('surface').classList.add('drop-zone-active');
                }
            }
            if (!dragState.moved) return;

            if (dragGhost) {
                dragGhost.style.left = e.clientX + 'px';
                dragGhost.style.top = e.clientY + 'px';
            }

            if (dragState.isPlaced) {
                const surface = document.getElementById('surface');
                const sRect = surface.getBoundingClientRect();
                const x = (e.clientX - sRect.left - dragState.offsetX - pan.x) / zoom;
                const y = (e.clientY - sRect.top - dragState.offsetY - pan.y) / zoom;
                const cx = Math.max(0, Math.min(x, 4000));
                const cy = Math.max(0, Math.min(y, 4000));
                dragState.el.style.left = cx + 'px';
                dragState.el.style.top = cy + 'px';
                const p = placed.find(p => p.placedId === dragState.el.dataset.placedId);
                if (p) { p.x = cx; p.y = cy; }

                // Multi-select: mover outros selecionados pelo MESMO delta
                if (dragState.multiSelected && dragState.multiSelected.length > 0) {
                    const dx = cx - dragState.initialPlacedX;
                    const dy = cy - dragState.initialPlacedY;
                    dragState.multiSelected.forEach(sib => {
                        const newX = Math.max(0, Math.min(sib.startX + dx, 4000));
                        const newY = Math.max(0, Math.min(sib.startY + dy, 4000));
                        sib.el.style.left = newX + 'px';
                        sib.el.style.top = newY + 'px';
                        const pSib = placed.find(pp => pp.placedId === sib.placedId);
                        if (pSib) { pSib.x = newX; pSib.y = newY; }
                    });
                }

                renderWires();
            }
        }

        function onPuckPointerUp(e) {
            if (!dragState) return;
            window.removeEventListener('pointermove', onPuckPointerMove);
            window.removeEventListener('pointerup', onPuckPointerUp);
            destroyDragGhost();

            if (!dragState.isPlaced) {
                document.getElementById('surface').classList.remove('drop-zone-active');
                if (dragState.moved) {
                    const surface = document.getElementById('surface');
                    const sRect = surface.getBoundingClientRect();
                    if (e.clientX >= sRect.left && e.clientX <= sRect.right &&
                        e.clientY >= sRect.top && e.clientY <= sRect.bottom) {
                        const x = (e.clientX - sRect.left - 35 - pan.x) / zoom;
                        const y = (e.clientY - sRect.top - 35 - pan.y) / zoom;
                        placePuck(dragState.puckId, x, y);
                    }
                }
            } else {
                dragState.el.classList.remove('dragging');
                if (!dragState.moved) {
                    // CLICK simples: seleciona + popover
                    if (!dragState.shiftKey) {
                        clearSelection();
                    }
                    dragState.el.classList.add('selected');
                    showCompatPopover(dragState.el.dataset.placedId, dragState.el);
                } else {
                    saveWorkflow();
                    pushUndo({ type: 'move', placedId: dragState.el.dataset.placedId });
                }
            }
            dragState = null;
        }

        function clearSelection() {
            document.querySelectorAll('.placed-puck.selected, .post-it.selected').forEach(el => el.classList.remove('selected'));
            removeCompatPopover();
        }

        function createDragGhost(puckId, x, y) {
            const data = DB[puckId];
            dragGhost = document.createElement('div');
            dragGhost.className = `drag-ghost ${data.type}`;
            dragGhost.innerHTML = `${renderIconHTML(data.iconKey, data.emoji)}`;
            dragGhost.style.left = x + 'px';
            dragGhost.style.top = y + 'px';
            document.body.appendChild(dragGhost);
            checkIconifyFallback(dragGhost);
        }

        function destroyDragGhost() {
            if (dragGhost) { dragGhost.remove(); dragGhost = null; }
        }

        // ============ CONECTORES (drag pra cabo) ============
        function attachConnectorEvents(puckEl, data) {
            puckEl.querySelectorAll('.connector').forEach(connEl => {
                connEl.addEventListener('pointerdown', e => {
                    e.stopPropagation();
                    e.preventDefault();
                    onConnectorPointerDown(e, connEl);
                });
            });
        }

        function onConnectorPointerDown(e, connEl) {
            const placedId = connEl.dataset.placedId;
            const dir = connEl.dataset.connDir;
            const idx = parseInt(connEl.dataset.connIdx);
            const type = connEl.dataset.connType;

            highlightCompatibleConnectors(placedId, dir, type);
            const start = getConnectorPos(placedId, dir, idx);

            wireState = {
                sourcePlacedId: placedId, sourceIdx: idx, sourceDir: dir,
                sourceType: type,
                startX: start.x, startY: start.y,
                currentX: start.x, currentY: start.y
            };

            const svg = document.getElementById('wires-svg');
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.id = 'wire-drawing-path';
            path.classList.add('wire-path', 'wire-drawing');
            path.setAttribute('stroke', getTypeColor(type));
            svg.appendChild(path);
            updateDrawingWire();

            window.addEventListener('pointermove', onConnectorPointerMove);
            window.addEventListener('pointerup', onConnectorPointerUp);
        }

        function onConnectorPointerMove(e) {
            if (!wireState) return;
            const surface = document.getElementById('surface');
            const sRect = surface.getBoundingClientRect();
            wireState.currentX = (e.clientX - sRect.left - pan.x) / zoom;
            wireState.currentY = (e.clientY - sRect.top - pan.y) / zoom;
            updateDrawingWire();
        }

        function onConnectorPointerUp(e) {
            if (!wireState) return;
            window.removeEventListener('pointermove', onConnectorPointerMove);
            window.removeEventListener('pointerup', onConnectorPointerUp);

            const target = document.elementFromPoint(e.clientX, e.clientY);
            // Verifica se soltou em um connector — pode ser compatível (wire-target) ou incompatível
            if (target && target.classList.contains('connector') && target.dataset.placedId &&
                target.dataset.placedId !== wireState.sourcePlacedId) {
                const targetPlacedId = target.dataset.placedId;
                const targetDir = target.dataset.connDir;
                const targetIdx = parseInt(target.dataset.connIdx);
                const targetType = target.dataset.connType;
                // Só aceita se direção é oposta à da origem (out→in ou in→out)
                const expectedTargetDir = wireState.sourceDir === 'out' ? 'in' : 'out';
                if (targetDir !== expectedTargetDir) {
                    wireState = null;
                    clearCompatibleConnectors();
                    document.getElementById('wire-drawing-path')?.remove();
                    return;
                }
                const needsAdapter = targetType !== wireState.sourceType;

                // CAPTURA todos os valores de wireState localmente AGORA — porque
                // o callback async do modal de confirmação pode rodar depois de wireState ser limpado.
                const ws = {
                    sourcePlacedId: wireState.sourcePlacedId,
                    sourceIdx: wireState.sourceIdx,
                    sourceDir: wireState.sourceDir,
                    sourceType: wireState.sourceType
                };

                // Função que efetivamente cria o wire — usa `ws` capturado, não wireState
                // mode: 'replace' (default) | 'accumulate' — controla se substitui ou acumula
                const createWire = (mode = 'replace') => {
                    let source, target_;
                    if (ws.sourceDir === 'out') {
                        source = { placedId: ws.sourcePlacedId, idx: ws.sourceIdx };
                        target_ = { placedId: targetPlacedId, idx: targetIdx };
                    } else {
                        source = { placedId: targetPlacedId, idx: targetIdx };
                        target_ = { placedId: ws.sourcePlacedId, idx: ws.sourceIdx };
                    }
                    const inputPid = ws.sourceDir === 'in' ? ws.sourcePlacedId : targetPlacedId;
                    const inputIdx = ws.sourceDir === 'in' ? ws.sourceIdx : targetIdx;
                    if (mode === 'replace') {
                        wires = wires.filter(w => !(w.targetPlacedId === inputPid && w.targetIdx === inputIdx));
                    }
                    // Se mode === 'accumulate', não filtra — mantém os existentes

                    const sourceTypeFinal = ws.sourceDir === 'out' ? ws.sourceType : targetType;
                    const targetTypeFinal = ws.sourceDir === 'out' ? targetType : ws.sourceType;

                    const newWire = {
                        id: `w_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`,
                        sourcePlacedId: source.placedId, sourceIdx: source.idx,
                        targetPlacedId: target_.placedId, targetIdx: target_.idx,
                        type: sourceTypeFinal,
                        targetType: targetTypeFinal,
                        needsAdapter: needsAdapter
                    };
                    wires.push(newWire);
                    pushUndo({ type: 'wire-add', wire: newWire });
                    renderWires();
                    saveWorkflow();
                    updateStats();
                };

                // Lógica completa de criação:
                // 1. Se tipo incompatível → confirma incompatibilidade
                // 2. Se input já tem conexão → comportamento depende:
                //    - Se conector é var:true (foi feito pra múltiplas) → acumula direto
                //    - Senão → pergunta acumular/substituir
                const targetInputPid = ws.sourceDir === 'in' ? ws.sourcePlacedId : targetPlacedId;
                const targetInputIdx = ws.sourceDir === 'in' ? ws.sourceIdx : targetIdx;
                const existing = wires.filter(w => w.targetPlacedId === targetInputPid && w.targetIdx === targetInputIdx);
                const hasExisting = existing.length > 0;
                // Verifica se o conector destino é "variable" (aceita N inputs por design)
                const targetPeca = placed.find(p => p.placedId === targetInputPid);
                const targetConn = targetPeca && targetPeca.inputs && targetPeca.inputs[targetInputIdx];
                const isVar = targetConn && targetConn.var === true;

                const proceedAfterTypeCheck = () => {
                    if (hasExisting) {
                        if (isVar) {
                            // Conector "var" — acumula automaticamente sem perguntar
                            createWire('accumulate');
                        } else {
                            // Conector regular — pergunta o que fazer
                            confirmExistingConnection(existing.length, () => createWire('replace'), () => createWire('accumulate'));
                        }
                    } else {
                        createWire('replace');
                    }
                };

                if (needsAdapter) {
                    const srcLabel = TYPE_LABELS[ws.sourceType];
                    const tgtLabel = TYPE_LABELS[targetType];
                    confirmIncompatibleConnection(srcLabel, tgtLabel, proceedAfterTypeCheck);
                    wireState = null;
                    clearCompatibleConnectors();
                    document.getElementById('wire-drawing-path')?.remove();
                    return;
                } else {
                    proceedAfterTypeCheck();
                }
            }

            const dp = document.getElementById('wire-drawing-path');
            if (dp) dp.remove();
            clearCompatibleConnectors();
            wireState = null;
            updateStats();
        }

        // Modal de confirmação pra conexão incompatível.
        // Mostra alerta vermelho e aguarda confirmação explícita do usuário.
        function confirmIncompatibleConnection(srcType, tgtType, onConfirm) {
            const root = document.getElementById('modal-root');
            const srcColor = getTypeColor(srcTypeKey(srcType));
            const tgtColor = getTypeColor(srcTypeKey(tgtType));
            // Cada linha vira uma row com display:flex pra garantir alinhamento perfeito.
            const row = (label, type, color) => `
                <div style="display: flex; align-items: center; gap: 10px; padding: 4px 0;">
                    <span style="color: var(--ink-soft); min-width: 80px;">${label}</span>
                    <span style="display: inline-block; padding: 4px 12px; border-radius: 6px;
                                 background: ${color}; color: #fff; font-weight: 600;">${type}</span>
                </div>`;
            root.innerHTML = `
                <div class="modal-backdrop show" onclick="if(event.target===this) closeModal()">
                    <div class="modal" style="max-width: 460px;">
                        <button class="modal-close" onclick="closeModal()">×</button>
                        <div class="modal-title" style="color: var(--t-ctrl);">⚠️ Conexão incompatível</div>
                        <p style="color: var(--ink); margin: 14px 0 8px;">Você está tentando conectar:</p>
                        <div style="margin: 14px 0;">
                            ${row('Saída:', srcType, srcColor)}
                            ${row('Entrada:', tgtType, tgtColor)}
                        </div>
                        <p style="color: var(--ink-soft); font-size: 0.85rem; line-height: 1.55; margin: 14px 0;">
                            Os tipos não batem. Pra conectar, o Music.AI precisaria fazer uma conversão automática
                            entre os formatos. Isso pode não funcionar — ou pode exigir um adaptador no fluxo.
                        </p>
                        <div class="modal-actions" style="margin-top: 20px;">
                            <button class="header-btn" onclick="closeModal()">Cancelar</button>
                            <button class="header-btn danger" id="confirm-incompat-btn">Conectar mesmo assim</button>
                        </div>
                    </div>
                </div>
            `;
            const btn = document.getElementById('confirm-incompat-btn');
            btn.style.background = 'var(--t-ctrl)';
            btn.style.color = '#FFF';
            btn.style.borderColor = 'var(--t-ctrl)';
            btn.addEventListener('click', () => {
                closeModal();
                onConfirm();
            });
        }
        // Helper: encontra a key de tipo a partir do label (ex: "Áudio" → "audio")
        function srcTypeKey(label) {
            for (const [key, val] of Object.entries(TYPE_LABELS)) {
                if (val === label) return key;
            }
            return 'audio';
        }

        // Modal de decisão pra entrada que já tem conexão.
        // 3 botões: Cancelar / Substituir / Acumular (vermelho).
        function confirmExistingConnection(existingCount, onReplace, onAccumulate) {
            const root = document.getElementById('modal-root');
            const plural = existingCount > 1;
            root.innerHTML = `
                <div class="modal-backdrop show" onclick="if(event.target===this) closeModal()">
                    <div class="modal" style="max-width: 480px;">
                        <button class="modal-close" onclick="closeModal()">×</button>
                        <div class="modal-title">Entrada já tem conexão${plural ? 'ões' : ''}</div>
                        <p style="color: var(--ink); line-height: 1.55; margin: 14px 0;">
                            Esta entrada já recebe ${existingCount} ${plural ? 'cabos' : 'cabo'}.
                            O que fazer com a nova conexão?
                        </p>
                        <p style="color: var(--ink-soft); font-size: 0.85rem; line-height: 1.55; margin: 14px 0;">
                            <b>Substituir</b>: remove ${plural ? 'as anteriores' : 'a anterior'} e mantém só a nova.<br>
                            <b>Acumular</b>: mantém ${plural ? 'todas as conexões' : 'a anterior'} + adiciona a nova
                            (o módulo precisará processar múltiplas entradas).
                        </p>
                        <div class="modal-actions" style="margin-top: 20px;">
                            <button class="header-btn" onclick="closeModal()">Cancelar</button>
                            <button class="header-btn" id="confirm-replace-btn">Substituir</button>
                            <button class="header-btn danger" id="confirm-accumulate-btn">Acumular entradas</button>
                        </div>
                    </div>
                </div>
            `;
            const btnAcc = document.getElementById('confirm-accumulate-btn');
            btnAcc.style.background = 'var(--t-ctrl)';
            btnAcc.style.color = '#FFF';
            btnAcc.style.borderColor = 'var(--t-ctrl)';
            btnAcc.addEventListener('click', () => {
                closeModal();
                onAccumulate();
            });
            const btnRep = document.getElementById('confirm-replace-btn');
            btnRep.addEventListener('click', () => {
                closeModal();
                onReplace();
            });
        }

        function highlightCompatibleConnectors(sourcePlacedId, sourceDir, sourceType) {
            const targetDir = sourceDir === 'out' ? 'in' : 'out';
            // Só destaca conectores COMPATÍVEIS (mesmo tipo).
            // Incompatíveis NÃO recebem destaque visual — usuário precisa "forçar" o drop.
            document.querySelectorAll(`.placed-puck .connector[data-conn-dir="${targetDir}"][data-conn-type="${sourceType}"]`).forEach(c => {
                if (c.dataset.placedId !== sourcePlacedId) {
                    c.classList.add('wire-target');
                }
            });
        }

        function clearCompatibleConnectors() {
            document.querySelectorAll('.connector.wire-target').forEach(c => {
                c.classList.remove('wire-target');
            });
        }

        function getTypeColor(type) {
            const colors = {
                audio: '#4FB0F0', midi: '#5BD18E', text: '#F0A040',
                video: '#B894E0', data: '#F0C840', ctrl: '#E86868',
                chord: '#C870E8'
            };
            return colors[type] || '#888';
        }

        function getConnectorPos(placedId, dir, idx) {
            const peca = placed.find(p => p.placedId === placedId);
            if (!peca) return { x: 0, y: 0 };
            const conns = dir === 'in' ? peca.inputs : peca.outputs;
            const total = conns.length;
            const TILE = 70;
            // Fórmula generalizada — espalha N conectores entre 12% e 88% da peça.
            // Mantém consistência com as regras CSS in-1of1...in-5of5.
            let yPercent;
            if (total === 1) yPercent = 0.5;
            else if (total === 2) yPercent = idx === 0 ? 0.30 : 0.70;
            else if (total === 3) yPercent = [0.20, 0.50, 0.80][idx];
            else if (total === 4) yPercent = [0.15, 0.38, 0.62, 0.85][idx];
            else yPercent = [0.12, 0.31, 0.50, 0.69, 0.88][idx] || 0.5;
            const x = peca.x + (dir === 'in' ? -4 : TILE + 4) + 6;
            const y = peca.y + yPercent * TILE;
            return { x, y };
        }

        // ============ RENDER CABOS ============
        function renderWires() {
            const svg = document.getElementById('wires-svg');
            svg.querySelectorAll('.wire-path:not(.wire-drawing), .wire-label, .wire-label-bg, .wire-adapter-mark, defs linearGradient[id^="wire-grad-"]').forEach(el => el.remove());

            wires.forEach(w => {
                const start = getConnectorPos(w.sourcePlacedId, 'out', w.sourceIdx);
                const end = getConnectorPos(w.targetPlacedId, 'in', w.targetIdx);

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.classList.add('wire-path');

                // Validação semântica básica: peças do mesmo tipo conectadas
                const srcPeca = placed.find(p => p.placedId === w.sourcePlacedId);
                const tgtPeca = placed.find(p => p.placedId === w.targetPlacedId);
                if (srcPeca && tgtPeca && srcPeca.puckId === tgtPeca.puckId) {
                    path.classList.add('semantic-warning');
                }

                path.setAttribute('d', bezierPath(start.x, start.y, end.x, end.y));
                if (w.needsAdapter && w.targetType && w.targetType !== w.type) {
                    // Cabo "com adaptador": gradiente entre as duas cores.
                    // Cria <linearGradient> único pra esse wire e referencia via stroke="url(#id)"
                    const gradId = `wire-grad-${w.id}`;
                    let grad = svg.querySelector(`#${gradId}`);
                    if (!grad) {
                        let defs = svg.querySelector('defs');
                        if (!defs) {
                            defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
                            svg.insertBefore(defs, svg.firstChild);
                        }
                        grad = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
                        grad.id = gradId;
                        grad.setAttribute('x1', start.x); grad.setAttribute('y1', start.y);
                        grad.setAttribute('x2', end.x); grad.setAttribute('y2', end.y);
                        grad.setAttribute('gradientUnits', 'userSpaceOnUse');
                        const s1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
                        s1.setAttribute('offset', '0%'); s1.setAttribute('stop-color', getTypeColor(w.type));
                        const s2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
                        s2.setAttribute('offset', '100%'); s2.setAttribute('stop-color', getTypeColor(w.targetType));
                        grad.appendChild(s1); grad.appendChild(s2);
                        defs.appendChild(grad);
                    } else {
                        // Atualiza posições (caso peças tenham movido)
                        grad.setAttribute('x1', start.x); grad.setAttribute('y1', start.y);
                        grad.setAttribute('x2', end.x); grad.setAttribute('y2', end.y);
                    }
                    path.setAttribute('stroke', `url(#${gradId})`);
                } else {
                    path.setAttribute('stroke', getTypeColor(w.type));
                }
                path.dataset.wireId = w.id;
                path.addEventListener('click', () => deleteWire(w.id));
                svg.appendChild(path);

                // Label do cabo: lógica unificada
                // - Sem custom, sem adapter: "tipo" (itálico)
                // - Com custom, sem adapter: "nome [Tipo]"
                // - Sem custom, com adapter: "Tipo→Tipo" (mostra conversão)
                // - Com custom, com adapter: "nome [Tipo→Tipo]"
                const midX = (start.x + end.x) / 2;
                const midY = (start.y + end.y) / 2;
                const isCustom = !!w.customLabel;
                const isAdapter = w.needsAdapter && w.targetType && w.targetType !== w.type;
                const typeLabel = isAdapter
                    ? `${TYPE_LABELS[w.type]}→${TYPE_LABELS[w.targetType]}`
                    : TYPE_LABELS[w.type];
                const labelText = isCustom
                    ? `${w.customLabel} [${typeLabel}]`
                    : typeLabel.toLowerCase();
                const bgW = Math.max(40, labelText.length * 6.8 + 16);
                const bgH = 18;

                const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                bg.classList.add('wire-label-bg');
                bg.setAttribute('x', midX - bgW / 2); bg.setAttribute('y', midY - bgH / 2);
                bg.setAttribute('width', bgW); bg.setAttribute('height', bgH);
                bg.setAttribute('rx', 5);
                bg.setAttribute('fill', '#F8F4EA');
                bg.setAttribute('stroke', isAdapter ? '#F0C840' : getTypeColor(w.type));
                bg.setAttribute('stroke-width', isCustom ? 1.5 : 1);
                if (isAdapter) bg.setAttribute('stroke-dasharray', '3,2');
                bg.style.cursor = 'text';
                svg.appendChild(bg);

                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.classList.add('wire-label');
                text.setAttribute('x', midX); text.setAttribute('y', midY);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('dominant-baseline', 'middle');
                text.setAttribute('font-size', isCustom ? '11' : '10');
                text.setAttribute('font-weight', '600');
                text.setAttribute('fill', isAdapter ? '#9C7800' : getTypeColor(w.type));
                text.setAttribute('font-family', '-apple-system, sans-serif');
                text.setAttribute('font-style', isCustom ? 'normal' : 'italic');
                text.textContent = labelText;
                text.style.cursor = 'text';
                svg.appendChild(text);

                // Marca de adaptador: 2 linhas paralelas perpendiculares ao cabo,
                // posicionadas perto do CONECTOR DE ENTRADA (que é o "incompatível"),
                // não no meio do cabo (que sobrepõe o label).
                if (isAdapter) {
                    // Amostro pontos perto do final da curva (t=0.85 e t=0.90)
                    // pra calcular tangente e posicionar a marca lá
                    const samplePoint = (t) => {
                        const dx = end.x - start.x;
                        const offset = Math.max(40, dx * 0.4);
                        const c1x = start.x + offset, c1y = start.y;
                        const c2x = end.x - offset,   c2y = end.y;
                        const u = 1 - t;
                        const x = u*u*u*start.x + 3*u*u*t*c1x + 3*u*t*t*c2x + t*t*t*end.x;
                        const y = u*u*u*start.y + 3*u*u*t*c1y + 3*u*t*t*c2y + t*t*t*end.y;
                        return { x, y };
                    };
                    // Posição da marca: ~80% do caminho (perto do destino, mas com folga
                    // pra não colar no conector)
                    const pA = samplePoint(0.78);
                    const pB = samplePoint(0.82);
                    const pMid = samplePoint(0.80);
                    // Vetor tangente normalizado
                    const tdx = pB.x - pA.x;
                    const tdy = pB.y - pA.y;
                    const tlen = Math.sqrt(tdx*tdx + tdy*tdy) || 1;
                    const tx = tdx / tlen;
                    const ty = tdy / tlen;
                    // Vetor perpendicular (tangente girada 90°)
                    const px = -ty;
                    const py = tx;
                    const halfLen = 7;
                    const gap = 4;

                    const mark = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    mark.classList.add('wire-adapter-mark');
                    mark.dataset.wireId = w.id;

                    const colorA = getTypeColor(w.type);
                    const colorB = getTypeColor(w.targetType);

                    // Linha 1 — antes (lado da origem) — cor do tipo origem
                    const line1 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line1.setAttribute('x1', pMid.x - tx*gap/2 - px*halfLen);
                    line1.setAttribute('y1', pMid.y - ty*gap/2 - py*halfLen);
                    line1.setAttribute('x2', pMid.x - tx*gap/2 + px*halfLen);
                    line1.setAttribute('y2', pMid.y - ty*gap/2 + py*halfLen);
                    line1.setAttribute('stroke', colorA);
                    line1.setAttribute('stroke-width', '3');
                    line1.setAttribute('stroke-linecap', 'round');

                    // Linha 2 — depois (lado do destino) — cor do tipo destino
                    const line2 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line2.setAttribute('x1', pMid.x + tx*gap/2 - px*halfLen);
                    line2.setAttribute('y1', pMid.y + ty*gap/2 - py*halfLen);
                    line2.setAttribute('x2', pMid.x + tx*gap/2 + px*halfLen);
                    line2.setAttribute('y2', pMid.y + ty*gap/2 + py*halfLen);
                    line2.setAttribute('stroke', colorB);
                    line2.setAttribute('stroke-width', '3');
                    line2.setAttribute('stroke-linecap', 'round');

                    mark.appendChild(line1);
                    mark.appendChild(line2);
                    const ttip = document.createElementNS('http://www.w3.org/2000/svg', 'title');
                    ttip.textContent = `Adaptador: ${TYPE_LABELS[w.type]} → ${TYPE_LABELS[w.targetType]}`;
                    mark.appendChild(ttip);
                    svg.appendChild(mark);
                }

                // Click no label (bg ou text) abre modal de edição. stopPropagation impede deletar o cabo.
                const editLabelHandler = (ev) => {
                    ev.stopPropagation();
                    openRenameWireModal(w.id);
                };
                bg.addEventListener('click', editLabelHandler);
                text.addEventListener('click', editLabelHandler);
            });

            // Atualizar indicadores de inputs obrigatórios faltando
            updateMissingRequiredIndicators();
        }

        function updateDrawingWire() {
            const path = document.getElementById('wire-drawing-path');
            if (!path || !wireState) return;
            path.setAttribute('d', bezierPath(wireState.startX, wireState.startY, wireState.currentX, wireState.currentY));
        }

        function bezierPath(x1, y1, x2, y2) {
            const dx = Math.abs(x2 - x1);
            const offset = Math.max(40, dx * 0.4);
            return `M ${x1} ${y1} C ${x1 + offset} ${y1}, ${x2 - offset} ${y2}, ${x2} ${y2}`;
        }

        function deleteWire(wireId) {
            const w = wires.find(w => w.id === wireId);
            if (!w) return;
            pushUndo({ type: 'wire-delete', wire: w });
            wires = wires.filter(x => x.id !== wireId);
            renderWires();
            saveWorkflow();
            updateStats();
        }

        // ============ INDICADOR INPUTS OBRIGATÓRIOS FALTANDO ============
        function updateMissingRequiredIndicators() {
            // Limpa todos
            document.querySelectorAll('.connector.missing-required').forEach(c => c.classList.remove('missing-required'));

            placed.forEach(peca => {
                const ins = peca.inputs || [];
                ins.forEach((inputDef, idx) => {
                    if (!inputDef.req) return;
                    // Tem cabo nesse input?
                    const hasWire = wires.some(w => w.targetPlacedId === peca.placedId && w.targetIdx === idx);
                    if (!hasWire) {
                        // Marca o conector como faltando
                        const conn = document.querySelector(`.placed-puck[data-placed-id="${peca.placedId}"] .connector[data-conn-dir="in"][data-conn-idx="${idx}"]`);
                        if (conn) conn.classList.add('missing-required');
                    }
                });
            });
        }

        // ============ COLOCAR/REMOVER PEÇA ============
        function placePuck(puckId, x, y, opts = {}) {
            const data = DB[puckId];
            const placedId = opts.placedId || `p_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
            const p = { ...data, puckId, placedId, x, y, textContent: opts.textContent || null };
            placed.push(p);
            const el = makePuck(puckId, p, true);
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.getElementById('canvas').appendChild(el);
            updateStats();
            updateEmpty();
            renderWires();
            if (!opts.noSave) saveWorkflow();
            if (!opts.noUndo) pushUndo({ type: 'puck-add', placedId });
            return placedId;
        }

        window.deletePuck = function(placedId) {
            const peca = placed.find(p => p.placedId === placedId);
            if (!peca) return;
            const removedWires = wires.filter(w => w.sourcePlacedId === placedId || w.targetPlacedId === placedId);
            pushUndo({ type: 'puck-delete', peca: { ...peca }, wires: removedWires });

            placed = placed.filter(p => p.placedId !== placedId);
            wires = wires.filter(w => w.sourcePlacedId !== placedId && w.targetPlacedId !== placedId);
            const el = document.querySelector(`.placed-puck[data-placed-id="${placedId}"]`);
            if (el) el.remove();
            renderWires();
            updateStats();
            updateEmpty();
            saveWorkflow();
            removeCompatPopover();
        };

        // ============ POPOVER COMPATÍVEIS ============
        function showCompatPopover(placedId, anchorEl) {
            removeCompatPopover();
            const peca = placed.find(p => p.placedId === placedId);
            if (!peca) return;

            // Monta colunas: uma por conector da peça
            const columns = [];
            (peca.inputs || []).forEach((conn, idx) => {
                const compatibles = findCompatiblesForConnector(peca, 'in', conn);
                columns.push({
                    dir: 'in', idx, conn,
                    label: connectorLabel('in', idx, peca.inputs.length, conn),
                    compatibles
                });
            });
            (peca.outputs || []).forEach((conn, idx) => {
                const compatibles = findCompatiblesForConnector(peca, 'out', conn);
                columns.push({
                    dir: 'out', idx, conn,
                    label: connectorLabel('out', idx, peca.outputs.length, conn),
                    compatibles
                });
            });

            if (columns.length === 0) return;

            const popover = document.createElement('div');
            popover.className = 'compat-popover';
            popover.id = 'compat-popover';

            const columnsHTML = columns.map(col => {
                const items = col.compatibles.length > 0
                    ? col.compatibles.map(c => `
                        <div class="compat-item" onclick="addCompatModule('${c.id}', '${placedId}')">
                            ${renderIconHTML(c.iconKey, c.emoji)}
                            <span>${c.name}</span>
                        </div>
                    `).join('')
                    : '<div class="compat-empty">Nenhum módulo</div>';

                const reqMark = col.conn.req ? '' : ' (opcional)';
                const varMark = col.conn.var ? ' [N]' : '';
                const connSquareStyle = `background: ${getTypeColor(col.conn.t)};` +
                    (col.conn.req ? '' : ` background: repeating-linear-gradient(45deg, ${getTypeColor(col.conn.t)} 0, ${getTypeColor(col.conn.t)} 2px, var(--paper-0) 2px, var(--paper-0) 4px);`);

                return `
                    <div class="compat-column">
                        <div class="compat-column-header" style="background: ${getTypeColor(col.conn.t)};">
                            <span class="conn-square" style="${connSquareStyle}"></span>
                            <span>${col.label}${reqMark}${varMark}</span>
                        </div>
                        <div class="compat-column-list">${items}</div>
                    </div>
                `;
            }).join('');

            popover.innerHTML = `
                <div class="compat-popover-header">
                    <span>↔ Conecta com — ${peca.name}</span>

            // Pra um conector específico, lista módulos do DB cujo conector OPOSTO tem o mesmo tipo

            const result = [];
            Object.entries(DB).forEach(([id, mod]) => {

        function renderPostIt(note) {
            const el = document.createElement('div');
            el.className = 'post-it' + (note.collapsed ? ' collapsed' : '');
            el.dataset.noteId = note.id;
            el.style.left = note.x + 'px';
            el.style.top = note.y + 'px';
            el.contentEditable = !note.collapsed;
            el.textContent = note.text;
            el.innerHTML += '<div class="delete-btn-note" data-action="delete-note">×</div>';
            el.innerHTML += `<div class="post-it-toggle" data-action="toggle-note" title="${note.collapsed ? 'Expandir' : 'Recolher'}">${note.collapsed ? '+' : '−'}</div>`;
            // Drag
            el.addEventListener('pointerdown', e => {
                if (e.target.dataset.action === 'delete-note') {
                    e.stopPropagation();
                    deletePostIt(note.id);
                    return;
                }
                if (e.target.dataset.action === 'toggle-note') {
                    e.stopPropagation();
                    e.preventDefault();
                    togglePostIt(note.id);
                    return;
                }
                if (e.target === el && !el.matches(':focus')) {
                    // Click no post-it colapsado expande
                    if (note.collapsed) {
                        e.preventDefault();
                        e.stopPropagation();
                        togglePostIt(note.id);
                        return;
                    }
                    e.preventDefault();
                    onPostItPointerDown(e, el, note);
                }
            });
            el.addEventListener('blur', () => {
                note.text = el.textContent.replace('×', '').trim();
                saveWorkflow();
            });
            el.addEventListener('click', () => {
                clearSelection();
                el.classList.add('selected');
            });
            document.getElementById('canvas').appendChild(el);
        }

        let postItDrag = null;
        function onPostItPointerDown(e, el, note) {
            const rect = el.getBoundingClientRect();
            postItDrag = {
                el, note,
                offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top
            };
            window.addEventListener('pointermove', onPostItPointerMove);
            window.addEventListener('pointerup', onPostItPointerUp);
        }
        function onPostItPointerMove(e) {
            if (!postItDrag) return;
            const surface = document.getElementById('surface');
            const sRect = surface.getBoundingClientRect();
            const x = (e.clientX - sRect.left - postItDrag.offsetX - pan.x) / zoom;
            const y = (e.clientY - sRect.top - postItDrag.offsetY - pan.y) / zoom;
            postItDrag.el.style.left = x + 'px';
            postItDrag.el.style.top = y + 'px';
            postItDrag.note.x = x;
            postItDrag.note.y = y;
        }

            window.removeEventListener('pointermove', onPostItPointerMove);

            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.contentEditable === 'true') return;

            // Delete apaga TODOS os elementos selecionados (módulos + post-its)
            // Só usa Delete, não Backspace, pra evitar conflito com navegação
            if (e.key === 'Delete') {
                const selectedPucks = Array.from(document.querySelectorAll('.placed-puck.selected'));
                const selectedNotes = Array.from(document.querySelectorAll('.post-it.selected'));
                if (selectedPucks.length > 0 || selectedNotes.length > 0) {
                    e.preventDefault();
                    selectedPucks.forEach(el => deletePuck(el.dataset.placedId));
                    selectedNotes.forEach(el => deletePostIt(el.dataset.noteId));
                }
            }
            if ((e.metaKey || e.ctrlKey) && e.key === 'z') {
                e.preventDefault();
                doUndo();
            }
            if ((e.metaKey || e.ctrlKey) && e.key === 'd') {
                e.preventDefault();
                duplicateSelected();
            }
            if (e.key === 'Escape') {
                clearSelection();
